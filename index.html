<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tab / PWA: PNG only — SVG favicons fail in some browsers and block the tab icon even when PNG works in <img>. -->
    <link rel="icon" type="image/png" sizes="any" href="/icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <script>
      (function() {
        var stored = localStorage.getItem('atlas-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var shouldDark = stored === 'dark' || (!stored && prefersDark);
        document.documentElement.classList.toggle('dark', shouldDark);
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>DC Automation</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
